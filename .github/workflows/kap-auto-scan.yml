name: KAP Auto Scan

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: KAP otomatik tarama
        run: |
          python kap_auto_scan.py

      - name: Sonuçları repoya yaz
        run: |
          git config user.name "kap-risk-bot"
          git config user.email "kap-risk-bot@users.noreply.github.com"
          git add data/latest_scan.json kap_risk_izleme_gecmis.json
          git commit -m "Update KAP auto scan data" || echo "No changes"
          git push